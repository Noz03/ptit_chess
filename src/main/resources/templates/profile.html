<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Profile & Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <nav class="bg-white shadow-md mb-8">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-gray-800">Chess App</h1>
            <button id="logout-btn" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded">Logout</button>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <!-- Profile Section -->
        <div class="col-span-1">
            <div class="bg-white rounded shadow-md p-6">
                <h2 class="text-2xl font-semibold mb-4 text-gray-800 border-b pb-2">Your Profile</h2>
                
                <div id="profile-content" class="hidden">
                    <div class="flex items-center space-x-4 mb-6">
                        <img id="profile-avatar" src="https://via.placeholder.com/100" alt="Avatar" class="w-20 h-20 rounded-full border-2 border-gray-300 object-cover">
                        <div>
                            <h3 id="profile-display-name" class="text-xl font-bold text-gray-900"></h3>
                            <p id="profile-username" class="text-gray-500 text-sm"></p>
                            <span id="profile-status" class="inline-block mt-1 px-2 py-1 text-xs font-semibold rounded-full"></span>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="bg-gray-50 p-3 rounded text-center">
                            <p class="text-gray-500 text-xs">ELO</p>
                            <p id="profile-elo" class="text-lg font-bold text-blue-600"></p>
                        </div>
                        <div class="bg-gray-50 p-3 rounded text-center">
                            <p class="text-gray-500 text-xs">Matches</p>
                            <p id="profile-matches" class="text-lg font-bold text-gray-700"></p>
                        </div>
                    </div>
                    
                    <div class="flex justify-between text-sm text-gray-600 mb-6 bg-gray-50 p-3 rounded">
                        <div class="text-center w-1/3 border-r">
                            <p class="text-green-600 font-semibold">W</p>
                            <p id="profile-win"></p>
                        </div>
                        <div class="text-center w-1/3 border-r">
                            <p class="text-gray-600 font-semibold">D</p>
                            <p id="profile-draw"></p>
                        </div>
                        <div class="text-center w-1/3">
                            <p class="text-red-600 font-semibold">L</p>
                            <p id="profile-loss"></p>
                        </div>
                    </div>

                    <form id="update-profile-form" class="mt-4 border-t pt-4">
                        <h4 class="text-md font-semibold mb-3">Update Profile</h4>
                        <div class="mb-3">
                            <label class="block text-xs text-gray-600 mb-1">Display Name</label>
                            <input type="text" id="update-display-name" class="w-full border rounded p-2 text-sm">
                        </div>
                        <div class="mb-3">
                            <label class="block text-xs text-gray-600 mb-1">Avatar URL</label>
                            <input type="text" id="update-avatar-url" class="w-full border rounded p-2 text-sm">
                        </div>
                        <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded text-sm w-full hover:bg-blue-600">Save</button>
                        <p id="update-msg" class="text-xs text-center mt-2"></p>
                    </form>
                </div>

                <div id="profile-loading" class="text-center py-10">
                    <p class="text-gray-500">Loading profile...</p>
                </div>
            </div>
        </div>

        <!-- Leaderboard Section -->
        <div class="col-span-1 md:col-span-2">
            <div class="bg-white rounded shadow-md p-6">
                <h2 class="text-2xl font-semibold mb-4 text-gray-800 border-b pb-2">Top 50 Leaderboard</h2>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 text-gray-600 text-sm uppercase tracking-wider">
                                <th class="p-3 border-b">Rank</th>
                                <th class="p-3 border-b">Player</th>
                                <th class="p-3 border-b">ELO</th>
                                <th class="p-3 border-b text-center">W / D / L</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body">
                            <!-- Leaderboard rows will go here -->
                        </tbody>
                    </table>
                </div>
                <div id="leaderboard-loading" class="text-center py-10">
                    <p class="text-gray-500">Loading leaderboard...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login';
        }

        const authHeaders = {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
        };

        // Fetch Profile
        async function loadProfile() {
            try {
                const response = await fetch('/api/player/profile', { headers: authHeaders });
                if (response.status === 401 || response.status === 403) {
                    localStorage.removeItem('token');
                    window.location.href = '/login';
                    return;
                }
                
                const profile = await response.json();
                
                document.getElementById('profile-loading').classList.add('hidden');
                document.getElementById('profile-content').classList.remove('hidden');
                
                document.getElementById('profile-display-name').textContent = profile.displayName;
                document.getElementById('profile-username').textContent = '@' + profile.username;
                if(profile.avatarUrl) {
                    document.getElementById('profile-avatar').src = profile.avatarUrl;
                }
                
                document.getElementById('profile-elo').textContent = profile.elo;
                document.getElementById('profile-matches').textContent = profile.winCount + profile.drawCount + profile.lossCount;
                document.getElementById('profile-win').textContent = profile.winCount;
                document.getElementById('profile-draw').textContent = profile.drawCount;
                document.getElementById('profile-loss').textContent = profile.lossCount;

                const statusEl = document.getElementById('profile-status');
                statusEl.textContent = profile.activityStatus;
                if(profile.activityStatus === 'ONLINE') {
                    statusEl.classList.add('bg-green-100', 'text-green-800');
                } else if(profile.activityStatus === 'PLAYING') {
                    statusEl.classList.add('bg-blue-100', 'text-blue-800');
                } else {
                    statusEl.classList.add('bg-gray-100', 'text-gray-800');
                }

                document.getElementById('update-display-name').value = profile.displayName;
                document.getElementById('update-avatar-url').value = profile.avatarUrl || '';

            } catch (error) {
                console.error('Error fetching profile:', error);
            }
        }

        // Fetch Leaderboard
        async function loadLeaderboard() {
            try {
                const response = await fetch('/api/player/leaderboard', { headers: authHeaders });
                const players = await response.json();
                
                document.getElementById('leaderboard-loading').classList.add('hidden');
                const tbody = document.getElementById('leaderboard-body');
                tbody.innerHTML = '';

                players.forEach((player, index) => {
                    const row = document.createElement('tr');
                    row.className = "border-b hover:bg-gray-50";
                    row.innerHTML = `
                        <td class="p-3 text-gray-700 font-semibold">${index + 1}</td>
                        <td class="p-3 flex items-center space-x-3">
                            <img src="${player.avatarUrl || 'https://via.placeholder.com/40'}" class="w-8 h-8 rounded-full object-cover">
                            <span class="font-medium text-gray-800">${player.displayName}</span>
                        </td>
                        <td class="p-3 text-blue-600 font-bold">${player.elo}</td>
                        <td class="p-3 text-center text-sm text-gray-600">${player.winCount} / ${player.drawCount} / ${player.lossCount}</td>
                    `;
                    tbody.appendChild(row);
                });

            } catch (error) {
                console.error('Error fetching leaderboard:', error);
            }
        }

        // Update Profile Form
        document.getElementById('update-profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const displayName = document.getElementById('update-display-name').value;
            const avatarUrl = document.getElementById('update-avatar-url').value;
            const msgEl = document.getElementById('update-msg');

            try {
                const response = await fetch('/api/player/profile', {
                    method: 'PUT',
                    headers: authHeaders,
                    body: JSON.stringify({ displayName, avatarUrl })
                });

                if (response.ok) {
                    msgEl.textContent = "Profile updated!";
                    msgEl.className = "text-xs text-center mt-2 text-green-500";
                    loadProfile();
                    loadLeaderboard();
                } else {
                    const text = await response.text();
                    msgEl.textContent = text || "Update failed.";
                    msgEl.className = "text-xs text-center mt-2 text-red-500";
                }
            } catch (error) {
                msgEl.textContent = "An error occurred.";
                msgEl.className = "text-xs text-center mt-2 text-red-500";
            }
            
            setTimeout(() => { msgEl.textContent = ''; }, 3000);
        });

        // Logout
        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = '/login';
        });

        // Init
        loadProfile();
        loadLeaderboard();
    </script>
</body>
</html>
