<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Match</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    
    <!-- Chessboard.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <nav class="bg-white shadow-md mb-8">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-gray-800">Chess Match</h1>
            <a href="/lobby" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded">Back to Lobby</a>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-4 flex flex-col md:flex-row gap-8 w-full">
        <!-- Chess Board Column -->
        <div class="flex-1 flex flex-col items-center">
            <div id="opponent-info" class="w-full max-w-[400px] mb-2 flex justify-between px-2 text-gray-700 font-semibold bg-white p-2 rounded shadow-sm">
                <span id="opponent-name">Waiting...</span>
                <span class="bg-gray-200 px-2 rounded text-sm self-center">Opponent</span>
            </div>
            
            <div id="board" class="w-full max-w-[400px] shadow-lg border-4 border-gray-800 rounded"></div>
            
            <div id="player-info" class="w-full max-w-[400px] mt-2 flex justify-between px-2 text-gray-700 font-semibold bg-white p-2 rounded shadow-sm">
                <span id="player-name">Loading...</span>
                <span class="bg-gray-200 px-2 rounded text-sm self-center">You</span>
            </div>
        </div>

        <!-- Controls Column -->
        <div class="w-full md:w-64 flex flex-col space-y-4">
            <div class="bg-white p-4 rounded shadow">
                <h3 class="font-bold border-b pb-2 mb-2">Match Info</h3>
                <p class="text-sm">Status: <span id="match-status" class="font-semibold text-blue-600">Connecting...</span></p>
                <p class="text-sm mt-2">Turn: <span id="match-turn" class="font-semibold text-green-600">-</span></p>
            </div>

            <div class="bg-white p-4 rounded shadow flex flex-col space-y-2">
                <button id="offer-draw-btn" class="bg-yellow-500 hover:bg-yellow-600 text-white py-2 rounded font-semibold disabled:opacity-50">Offer Draw</button>
                <button id="resign-btn" class="bg-red-500 hover:bg-red-600 text-white py-2 rounded font-semibold disabled:opacity-50">Resign</button>
            </div>
        </div>
    </div>

    <!-- End Game Modal -->
    <div id="endgame-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-lg shadow-xl text-center max-w-sm w-full mx-4">
            <h2 id="endgame-title" class="text-2xl font-bold mb-2">Game Over</h2>
            <p id="endgame-reason" class="text-gray-600 mb-6"></p>
            <button onclick="window.location.href='/lobby'" class="bg-blue-500 text-white px-6 py-2 rounded shadow hover:bg-blue-600 w-full">Back to Lobby</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login';

        // Extract roomId from URL
        const roomId = window.location.pathname.split('/').pop();
        
        let board = null;
        let game = new Chess();
        let stompClient = null;
        let matchData = null;
        let myPlayerId = null;
        let myColor = null; // 'w' or 'b'
        let subscription = null;

        // Initialize Board
        function initBoard() {
            const config = {
                draggable: true,
                position: 'start',
                onDragStart: onDragStart,
                onDrop: onDrop,
                onSnapEnd: onSnapEnd
            };
            board = Chessboard('board', config);
        }

        // Fetch match data
        async function loadMatchData() {
            try {
                // First get my profile to know my ID
                const profRes = await fetch('/api/player/profile', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const profile = await profRes.json();
                myPlayerId = profile.id;

                // Get match info
                const matchRes = await fetch('/api/matches/room/' + roomId, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if(!matchRes.ok) {
                    alert("Match not found or not in progress.");
                    window.location.href = '/lobby';
                    return;
                }

                matchData = await matchRes.json();
                
                // Determine orientation
                if(matchData.whitePlayerId === myPlayerId) {
                    myColor = 'w';
                    board.orientation('white');
                    document.getElementById('player-name').textContent = matchData.whitePlayerName + ' (White)';
                    document.getElementById('opponent-name').textContent = matchData.blackPlayerName + ' (Black)';
                } else {
                    myColor = 'b';
                    board.orientation('black');
                    document.getElementById('player-name').textContent = matchData.blackPlayerName + ' (Black)';
                    document.getElementById('opponent-name').textContent = matchData.whitePlayerName + ' (White)';
                }

                // Load existing PGN if any
                if(matchData.pgn) {
                    game.load_pgn(matchData.pgn);
                    board.position(game.fen());
                }

                updateStatus();
                connectWebSocket();

            } catch (error) {
                console.error("Error loading match data:", error);
            }
        }

        function connectWebSocket() {
            const socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);
            stompClient.debug = null;
            
            stompClient.connect({ 'Authorization': 'Bearer ' + token }, function (frame) {
                document.getElementById('match-status').textContent = 'In Progress';
                
                subscription = stompClient.subscribe('/topic/match/' + matchData.id, function (message) {
                    handleIncomingMessage(message.body);
                });
            });
        }

        function handleIncomingMessage(body) {
            if(body.startsWith("MOVE:")) {
                const pgn = body.substring(5);
                game.load_pgn(pgn);
                board.position(game.fen());
                updateStatus();
            } else if(body.startsWith("GAME_OVER:")) {
                const parts = body.split(":");
                showEndgame(parts[1], parts[2]);
            } else if(body.startsWith("DRAW_OFFERED:")) {
                const senderId = parseInt(body.split(":")[1]);
                if(senderId !== myPlayerId) {
                    if(confirm("Opponent offered a draw. Accept?")) {
                        stompClient.send("/app/match/" + matchData.id + "/accept-draw", {}, {});
                    }
                }
            }
        }

        function onDragStart(source, piece, position, orientation) {
            // Do not pick up pieces if the game is over
            if (game.game_over()) return false;

            // Only pick up pieces for the side to move
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }

            // Only pick up pieces if it's my turn
            if(game.turn() !== myColor) return false;
        }

        function onDrop(source, target) {
            // See if the move is legal
            const move = game.move({
                from: source,
                to: target,
                promotion: 'q' // NOTE: always promote to a queen for example simplicity
            });

            // Illegal move
            if (move === null) return 'snapback';

            updateStatus();
            sendMove(move);
        }

        function onSnapEnd() {
            // Update the board position after the piece snap
            // for castling, en passant, pawn promotion
            board.position(game.fen());
        }

        function sendMove(move) {
            const msg = {
                san: move.san,
                fen: game.fen(),
                pgn: game.pgn()
            };
            stompClient.send("/app/match/" + matchData.id + "/move", {}, JSON.stringify(msg));

            // Check if game over immediately on my side
            checkGameOverLocally();
        }

        function checkGameOverLocally() {
            if (game.game_over()) {
                if (game.in_checkmate()) {
                    const result = myColor === 'w' ? "WHITE_WIN" : "BLACK_WIN";
                    stompClient.send("/app/match/" + matchData.id + "/game-over", {}, result);
                } else if (game.in_draw() || game.in_stalemate() || game.in_threefold_repetition()) {
                    stompClient.send("/app/match/" + matchData.id + "/game-over", {}, "DRAW");
                }
            }
        }

        function updateStatus() {
            let statusHTML = '';

            let moveColor = game.turn() === 'w' ? 'White' : 'Black';

            if (game.in_checkmate()) {
                statusHTML = 'Game over, ' + moveColor + ' is in checkmate.';
            } else if (game.in_draw()) {
                statusHTML = 'Game over, drawn position';
            } else {
                statusHTML = moveColor + ' to move';
                if (game.in_check()) {
                    statusHTML += ', ' + moveColor + ' is in check';
                }
            }

            document.getElementById('match-turn').textContent = statusHTML;
        }

        function showEndgame(result, reason) {
            document.getElementById('endgame-modal').classList.remove('hidden');
            let title = "Draw";
            if(result === "WHITE_WIN") {
                title = myColor === 'w' ? "You Won!" : "You Lost!";
            } else if (result === "BLACK_WIN") {
                title = myColor === 'b' ? "You Won!" : "You Lost!";
            }
            
            document.getElementById('endgame-title').textContent = title;
            document.getElementById('endgame-reason').textContent = reason;
            
            document.getElementById('offer-draw-btn').disabled = true;
            document.getElementById('resign-btn').disabled = true;
        }

        document.getElementById('offer-draw-btn').addEventListener('click', () => {
            if(stompClient && matchData) {
                stompClient.send("/app/match/" + matchData.id + "/offer-draw", {}, {});
                alert("Draw offer sent.");
            }
        });

        document.getElementById('resign-btn').addEventListener('click', () => {
            if(confirm("Are you sure you want to resign?")) {
                if(stompClient && matchData) {
                    stompClient.send("/app/match/" + matchData.id + "/resign", {}, {});
                }
            }
        });

        initBoard();
        loadMatchData();

    </script>
</body>
</html>
